site_name: Ultimate Claude Workspace
site_url: https://alihusains.github.io/claude-skills/
site_description: "The complete one-shot Claude Code workspace replication: 153 skills, 47 agents, 80 commands, 16 rules, and 14 MCP configs."
site_author: Alihusain Sorathiya
repo_url: https://github.com/alihusains/claude-skills
repo_name: alihusains/claude-skills
copyright: "Built by Alihusain Sorathiya"

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest

nav:
  - Home: index.md
